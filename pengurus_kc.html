<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Struktur Pengurus KC</title>
    
    <script>
        // ==========================================
        // SISTEM AUTO-UPDATE PAKSA (PENGHANCUR CACHE)
        // ==========================================
        const PENGURUS_VERSION = "2.0"; // Tema Cyber Navy & Cyan
        if (localStorage.getItem('maka_pengurus_v') !== PENGURUS_VERSION) {
            if ('caches' in window) {
                caches.keys().then((names) => { names.forEach(name => { caches.delete(name); }); });
            }
            localStorage.setItem('maka_pengurus_v', PENGURUS_VERSION);
            window.location.reload(true); 
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700;900&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA CYBER NAVY & CYAN === */
        :root { 
            --cyan-logo: #00E5FF;     
            --cyan-dark: #0077B6;     
            --yellow-logo: #FFFF00;   
            --yellow-dark: #D4AF37;   
            --navy-bg: #050B14;       
            --bg-surface: #000000;    
            
            --card-bg: rgba(5, 11, 20, 0.7);
            --glass-border: rgba(0, 229, 255, 0.25);
        }
        
        body { 
            margin: 0; 
            background-color: var(--bg-surface);
            background-image: radial-gradient(circle at top right, var(--navy-bg) 0%, var(--bg-surface) 70%);
            font-family: 'Inter', sans-serif; 
            color: #fff; 
            padding-bottom: 120px; 
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }

        * { box-sizing: border-box; text-decoration: none; }

        /* AMBIENT LIGHTS */
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.25; animation: floatLight 10s infinite alternate; }
        .light-1 { top: -20%; left: -20%; width: 500px; height: 500px; background: var(--cyan-dark); }
        .light-2 { top: 40%; right: -30%; width: 400px; height: 400px; background: var(--cyan-logo); animation-delay: 2s; opacity: 0.15; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(20px, 40px);} }

        /* HEADER */
        .header { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); padding: 20px; display: flex; align-items: center; gap: 15px; z-index: 100; border-bottom: 1px solid rgba(0,229,255,0.2); box-shadow: 0 5px 20px rgba(0,0,0,0.5);}
        .btn-back { color: var(--cyan-logo); font-size: 20px; width: 40px; height: 40px; background: rgba(0, 229, 255, 0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: 1px solid rgba(0,229,255,0.2);}
        .btn-back:active { background: rgba(0, 229, 255, 0.2); transform: scale(0.9);}
        
        .header-title { display: flex; flex-direction: column; }
        .header-title h1 { margin: 0; font-family: 'Space Grotesk'; font-size: 20px; color: var(--cyan-logo); letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,229,255,0.3);}
        .header-title p { margin: 0; font-size: 10px; color: #94a3b8; font-weight: 600; letter-spacing: 1px; }

        .container { padding: 20px; }

        /* KARTU PENGURUS (NAVY GLASS) */
        .pengurus-grid { display: grid; gap: 15px; }
        .card-pengurus { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: 0.3s;}
        
        /* FOTO DENGAN BORDER CYAN */
        .photo-wrap { width: 65px; height: 65px; border-radius: 18px; border: 2px solid var(--cyan-logo); flex-shrink: 0; position: relative; overflow: hidden; background-color: #000; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); display: flex; align-items: center; justify-content: center;}
        .photo-bg { position: absolute; inset: 0; background-image: url('bg_maka.jpg'); background-size: cover; background-position: center; opacity: 0.6; z-index: 1; }
        .photo-img { position: relative; width: 100%; height: 100%; object-fit: cover; z-index: 2; border-radius: 16px; background: transparent; }
        .photo-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; color: rgba(255,255,255,0.4); z-index: 2; pointer-events: none;}

        .info-wrap { flex: 1; z-index: 2; min-width: 0;}
        .jabatan-badge { display: inline-block; font-family: 'Space Grotesk'; font-size: 9px; font-weight: 900; background: var(--cyan-logo); color: black; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; margin-bottom: 5px; box-shadow: 0 0 10px rgba(0,229,255,0.3);}
        .nama { margin: 0 0 3px 0; font-family: 'Outfit'; font-size: 16px; font-weight: 900; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase;}
        .detail { margin: 0; font-size: 11px; color: #94a3b8; font-weight: 600; display: flex; align-items: center; gap: 5px;}
        .divisi-tag { background: rgba(0, 229, 255, 0.1); color: var(--cyan-logo); border: 1px solid rgba(0,229,255,0.2); padding: 2px 6px; border-radius: 4px; font-size: 9px; }

        /* TOMBOL WA WARNA CYAN */
        .btn-wa { width: 45px; height: 45px; border-radius: 14px; background: rgba(0, 229, 255, 0.1); border: 1px solid var(--cyan-logo); display: flex; align-items: center; justify-content: center; color: var(--cyan-logo); font-size: 20px; box-shadow: 0 5px 15px rgba(0, 229, 255, 0.2); flex-shrink: 0; transition: 0.2s; z-index: 2;}
        .btn-wa:active { transform: scale(0.9); background: var(--cyan-logo); color: black;}
        
        /* EFEK GLOW KUNING (KARTIKA CHANDRA) UNTUK JABATAN TINGGI */
        .card-pengurus.top-tier { border-color: var(--yellow-logo); background: linear-gradient(135deg, rgba(5, 11, 20, 0.9) 0%, rgba(212, 175, 55, 0.1) 100%); box-shadow: 0 10px 25px rgba(212, 175, 55, 0.15);}
        .card-pengurus.top-tier .photo-wrap { border-color: var(--yellow-logo); box-shadow: 0 0 15px rgba(255, 255, 0, 0.2); }
        .card-pengurus.top-tier .jabatan-badge { background: linear-gradient(90deg, var(--yellow-logo) 0%, var(--yellow-dark) 100%); box-shadow: 0 0 10px rgba(255,255,0,0.3); }

        /* BACK NAV (SAMA SEPERTI HALAMAN LAIN) */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; text-align: center;}
        .btn-premium-back { background: rgba(5, 11, 20, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(0, 229, 255, 0.25); padding: 14px 25px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 12px; color: var(--cyan-logo); text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,229,255,0.15); transition: 0.2s;}
        .btn-premium-back:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <div class="header">
        <a href="dashboard_kc.html" class="btn-back"><i class="fas fa-chevron-left"></i></a>
        <div class="header-title">
            <h1>PENGURUS KC</h1>
            <p>MAKA LINTAS KARTIKA CHANDRA</p>
        </div>
    </div>

    <div class="container">
        <div class="pengurus-grid" id="pengurusList">
            <div style="text-align:center; padding:50px; color:#94A3B8;"><i class="fas fa-spinner fa-spin"></i> Menghubungkan Data...</div>
        </div>
    </div>

    <div class="back-nav">
        <a href="dashboard_kc.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // MURNI KONEKSI DATABASE KC (antriankcnew) --> GAK ADA HUBUNGAN LAGI SAMA MLU
        const firebaseConfig = { 
            apiKey: "AIzaSyDfsTAGclYUSRe6YhiljS-xb-v-9RBYVEM",
            authDomain: "antriankcnew.firebaseapp.com",
            projectId: "antriankcnew"
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // DATA 15 PENGURUS KARTIKA CHANDRA (Master Structure)
        const structurePengurus = [
            { namaDefault: "Agus Sukmana", jabatan: "Ketua", plat: "B 4124 SWI", divisi: "RTO", hp: "6281316048252", top: true },
            { namaDefault: "Rifky Alfiansyah", jabatan: "Wakil Ketua", plat: "B 4426 SWF", divisi: "RTO", hp: "6281283187508", top: true },
            { namaDefault: "Jerry", jabatan: "Sekretaris", plat: "B 4995 SWJ", divisi: "TransGo", hp: "6285931323303", top: true },
            { namaDefault: "Andri Prasetya", jabatan: "Pembina", plat: "B 4295 SWE", divisi: "TransGo", hp: "6288210637387", top: true },
            { namaDefault: "Awang Rock", jabatan: "Pembina", plat: "B 4617 SWH", divisi: "TransGo", hp: "628569288190", top: true },
            { namaDefault: "Alfian", jabatan: "Humas Internal", plat: "B 4959 SWF", divisi: "RTO", hp: "6285280065304" },
            { namaDefault: "FITO", jabatan: "Humas Eksternal", plat: "B 4372 SWJ", divisi: "RTO", hp: "6287880692224" },
            { namaDefault: "Don Thobias Chotob", jabatan: "Humas Eksternal", plat: "B 4439 SWD", divisi: "RTO", hp: "6281321251955" },
            { namaDefault: "Dino Three", jabatan: "Kreator", plat: "B 4903 SWG", divisi: "TransGo", hp: "628212349883" },
            { namaDefault: "Adi Setiawan", jabatan: "Kreator", plat: "B 4766 SWJ", divisi: "RTO", hp: "6285892167827" },
            { namaDefault: "Ricky Alamsyah", jabatan: "URC", plat: "B 5739 TFN", divisi: "URC", hp: "6287711069877" },
            { namaDefault: "Tyan", jabatan: "URC", plat: "B 4166 SWI", divisi: "TransGo", hp: "6285121312930" },
            { namaDefault: "M. Sauqi Vansuri", jabatan: "URC", plat: "B 4728 SWJ", divisi: "TransGo", hp: "6282249831918" },
            { namaDefault: "Franky Simanjuntak", jabatan: "URC", plat: "B 4174 SWI", divisi: "TransGo", hp: "6281385487429" }
        ];

        async function loadPengurus() {
            const listContainer = document.getElementById('pengurusList');
            let dbDataMap = {};

            try {
                // Tarik data asli dari Firebase KC (koleksi anggota)
                const querySnapshot = await getDocs(collection(db, "anggota"));
                querySnapshot.forEach((doc) => {
                    const d = doc.data();
                    const idRapat = (d.plat || "").replace(/\s+/g, '').toUpperCase();
                    dbDataMap[idRapat] = d;
                });
            } catch(e) {
                console.error("Gagal narik data:", e);
            }

            listContainer.innerHTML = '';

            // Gabungkan struktur manual dengan data dari Firebase
            structurePengurus.forEach(p => {
                const idRapat = (p.plat || "").replace(/\s+/g, '').toUpperCase();
                const dbMatch = dbDataMap[idRapat];
                
                // Gunakan nama dari DB jika ada, kalau tidak ada pakai manual
                const namaReal = dbMatch && (dbMatch.namaKtp || dbMatch.nama) ? (dbMatch.namaKtp || dbMatch.nama) : p.namaDefault;
                
                // Logika foto dengan transparansi background MAKA
                const emptyPixel = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
                const photoSrc = dbMatch && dbMatch.foto && dbMatch.foto.length > 50 ? dbMatch.foto : emptyPixel;
                const fallbackIcon = photoSrc === emptyPixel ? `<div class="photo-fallback"><i class="fas fa-user"></i></div>` : '';

                const waLink = `https://wa.me/${p.hp}`;
                const topClass = p.top ? 'top-tier' : '';

                const card = `
                    <div class="card-pengurus ${topClass}">
                        <div class="photo-wrap">
                            <div class="photo-bg"></div>
                            ${fallbackIcon}
                            <img src="${photoSrc}" class="photo-img" onerror="this.src='${emptyPixel}'">
                        </div>
                        <div class="info-wrap">
                            <div class="jabatan-badge">${p.jabatan}</div>
                            <h3 class="nama">${namaReal}</h3>
                            <p class="detail">
                                <i class="fas fa-motorcycle"></i> ${p.plat} 
                                <span class="divisi-tag">${p.divisi}</span>
                            </p>
                        </div>
                        <a href="${waLink}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i></a>
                    </div>
                `;
                listContainer.innerHTML += card;
            });
        }

        // Eksekusi fungsi load setelah halaman siap
        loadPengurus();
    </script>
</body>
</html>
