<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC - Directory Anggota</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --royal-blue: #D4FF00; --electric-blue: #10B981; --bg-surface: #050505; 
            --text-main: #FFFFFF; --text-muted: #94A3B8; --danger: #EF4444; --success: #10B981;
        }
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 120px; overflow-x: hidden; position: relative; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; text-decoration: none; }
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15; animation: floatLight 10s infinite alternate; }
        .light-1 { top: -20%; left: -20%; width: 500px; height: 500px; background: #D4FF00; }
        .light-2 { top: 40%; right: -30%; width: 400px; height: 400px; background: #10B981; animation-delay: 2s; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(20px, 40px);} }
        
        .header-main { padding: 40px 20px 20px; position: relative; z-index: 10; text-align: center; }
        .sub-tag { font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--electric-blue); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .main-title { font-family: 'Outfit'; font-size: 32px; font-weight: 900; color: var(--royal-blue); margin: 0; letter-spacing: -1px; text-shadow: 0 0 15px rgba(212,255,0,0.3); }
        
        .search-container { padding: 0 20px 20px; position: sticky; top: 0; z-index: 99; margin-top: 10px; }
        .search-box { background: #111; border-radius: 20px; padding: 5px 20px; display: flex; align-items: center; border: 1px solid #333; transition: 0.3s; }
        .search-box:focus-within { border-color: var(--royal-blue); }
        .search-box i { color: var(--royal-blue); font-size: 18px; margin-right: 12px; }
        .search-box input { flex: 1; border: none; padding: 16px 0; font-family: 'Inter'; font-size: 14px; font-weight: 600; background: transparent; color: var(--text-main); outline: none; }
        
        .list-container { padding: 0 20px 30px; display: flex; flex-direction: column; gap: 15px; }
        .member-card { background: #0f0f0f; border: 1px solid #222; border-radius: 24px; padding: 18px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); animation: slideUp 0.5s ease-out backwards; position: relative;}
        .member-card.is-pengurus { background: linear-gradient(135deg, #111 0%, rgba(212,255,0,0.05) 100%); border-color: rgba(212,255,0,0.3); border-left: 5px solid var(--royal-blue); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .m-photo-wrap { position: relative; width: 65px; height: 65px; border-radius: 18px; border: 2px solid #333; flex-shrink: 0; cursor: zoom-in; box-shadow: 0 8px 20px rgba(0,0,0,0.5); overflow: hidden; background: #111; }
        .is-pengurus .m-photo-wrap { border-color: var(--royal-blue); }
        .m-photo-bg { position: absolute; inset: 0; background-image: url('bg_maka.jpg'); background-size: cover; background-position: center; z-index: 1; opacity: 0.6; }
        .m-photo-img { position: relative; width: 100%; height: 100%; object-fit: cover; z-index: 3; background: transparent;}
        .m-photo-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; color: rgba(255,255,255,0.7); z-index: 2; }
        
        .m-info { flex: 1; min-width: 0; }
        .m-name { font-family: 'Outfit'; font-size: 12px; font-weight: 800; color: white; text-transform: uppercase; margin-bottom: 2px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .m-name-wa { font-size: 10px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .m-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
        .badge { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid transparent; }
        .bg-plat { background: rgba(212,255,0,0.1); color: var(--royal-blue); border-color: rgba(212,255,0,0.2); }
        .bg-role { background: rgba(255,255,255,0.05); color: #cbd5e1; border-color: rgba(255,255,255,0.1); }
        .bg-admin { background: var(--royal-blue); color: #000; }
        
        .m-actions { display: flex; flex-direction: column; gap: 8px; }
        .btn-act { width: 38px; height: 38px; border-radius: 12px; border: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-call { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
        .btn-edit { background: rgba(212,255,0,0.1); color: var(--royal-blue); border: 1px solid rgba(212,255,0,0.2); display: none; }
        .btn-del { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); display: none; }
        
        .fab-add { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--royal-blue); color: black; border-radius: 20px; display: none; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 20px rgba(212,255,0,0.4); border: 2px solid #000; cursor: pointer; z-index: 1000; }
        
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; text-align: center;}
        .btn-premium-back { background: rgba(10,10,10,0.9); backdrop-filter: blur(15px); border: 1px solid #333; padding: 14px 25px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 12px; color: var(--royal-blue); text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;}
        
        /* MODAL TAMBAH/EDIT DATA */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: 0.3s;}
        .modal-overlay.show { opacity: 1; }
        .modal-box { background: #111; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); transform: scale(0.9); transition: 0.3s; max-height: 90vh; overflow-y: auto;}
        .modal-overlay.show .modal-box { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 900; color: var(--royal-blue); }
        .btn-close { background: #222; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; color: white;}
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px;}
        .form-input { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #333; background: #000; font-family: 'Inter'; font-weight: 600; font-size: 14px; color: white; outline: none;}
        .form-input:focus { border-color: var(--royal-blue); }
        .upload-area { border: 2px dashed #444; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; position: relative; background: #0a0a0a; transition: 0.2s;}
        .upload-area:hover { border-color: var(--royal-blue); }
        .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .preview-img { width: 100%; max-height: 150px; object-fit: contain; display: none; margin-top: 10px; border-radius: 8px; border: 1px solid #333;}
        .btn-submit { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--royal-blue); color: black; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 900; margin-top: 10px; cursor: pointer; letter-spacing: 1px; transition: 0.2s;}
        .btn-submit:active { transform: scale(0.95); }

        /* CUSTOM MODAL ALERT/CONFIRM */
        .modal-glass-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal-glass-overlay.show { opacity: 1; }
        .modal-glass-box { background: #111; border-radius: 25px; padding: 25px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,0.8); transform: scale(0.9); transition: 0.3s; border: 1px solid rgba(255,255,255,0.15);}
        .modal-glass-overlay.show .modal-glass-box { transform: scale(1); }
        .btn-modal-custom { padding: 14px 25px; border-radius: 14px; font-weight: 800; font-size: 14px; border: none; cursor: pointer; flex: 1; margin: 0 5px; transition: 0.2s;}
        .btn-modal-custom:active { transform: scale(0.95); }
        .inp-prompt { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; font-family: 'Inter'; font-size: 16px; outline: none; margin-bottom: 20px; display: none; text-align: center; font-weight: bold;}
        .inp-prompt:focus { border-color: var(--royal-blue); }

        /* PHOTO VIEWER (LIGHTBOX) */
        .photo-viewer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); padding: 20px; opacity: 0; transition: 0.3s;}
        .photo-viewer-overlay.show { opacity: 1; }
        .pv-container { position: relative; max-width: 400px; width: 100%; text-align: center; transform: scale(0.8); transition: 0.3s; }
        .photo-viewer-overlay.show .pv-container { transform: scale(1); }
        .pv-container img { width: 100%; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); object-fit: contain; max-height: 80vh; border: 2px solid #333; background: #000;}
        .pv-close { position: absolute; top: -15px; right: -15px; width: 40px; height: 40px; border-radius: 50%; background: var(--danger); color: white; border: 2px solid white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); transition: 0.2s; }
        .pv-close:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <header class="header-main">
        <span class="sub-tag">DATABASE KOMUNITAS</span>
        <h1 class="main-title">DATA ANGGOTA KC</h1>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari nama, plat, atau jabatan..." onkeyup="filterList()">
        </div>
    </div>

    <main class="list-container" id="memberList">
        <div style="text-align:center; padding:50px; color:#94A3B8;"><i class="fas fa-spinner fa-spin"></i> Membangun Hierarki...</div>
    </main>

    <button class="fab-add" id="btnAdd" onclick="openModal('add')"><i class="fas fa-plus"></i></button>
    
    <div class="back-nav">
        <a href="dashboard_kc.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="modalTitleText">Tambah Anggota</div>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <input type="hidden" id="formId">
            <input type="hidden" id="formActionType">

            <div class="form-group" id="mataDewaGroup" style="display:none; background:rgba(212,255,0,0.05); padding:15px; border-radius:12px; border:1px dashed var(--royal-blue); margin-bottom:20px;">
                <label class="form-label" style="color: var(--royal-blue);"><i class="fas fa-eye"></i> MATA DEWA: PIN LOGIN (BISA DI-EDIT)</label>
                <input type="text" id="formPinLogin" class="form-input" placeholder="Set PIN Baru" style="border-color: var(--royal-blue); font-family: 'Space Grotesk'; letter-spacing: 3px; font-size: 16px; font-weight: 900; color: var(--royal-blue);">
                <div style="font-size:9px; color:#94A3B8; margin-top:5px;">*Fitur ini hanya bisa dilihat oleh Super Admin.</div>
            </div>

            <div class="form-group">
                <label class="form-label">Upload Foto Wajah</label>
                <div class="upload-area">
                    <i class="fas fa-camera" style="font-size:24px; color:var(--royal-blue); margin-bottom:5px; display:block;"></i>
                    <div style="font-size:11px; font-weight:700; color:var(--text-muted);">Tap untuk Upload (Opsional)</div>
                    <input type="file" id="formFotoInput" accept="image/png, image/jpeg" onchange="processPhoto(this)">
                    <img id="previewFoto" class="preview-img">
                </div>
            </div>

            <div class="form-group"><label class="form-label">Nama Legal (KTP)</label><input type="text" id="formNamaKtp" class="form-input" style="text-transform:uppercase;"></div>
            <div class="form-group"><label class="form-label">Nama di WA (Opsional)</label><input type="text" id="formNamaWa" class="form-input" style="text-transform:uppercase;"></div>
            <div class="form-group"><label class="form-label">Plat Nomor</label><input type="text" id="formPlat" class="form-input" style="text-transform:uppercase;"></div>
            <div class="form-group"><label class="form-label">Nomor WhatsApp</label><input type="tel" id="formHp" class="form-input"></div>
            
            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;">
                    <label class="form-label">Jabatan</label>
                    <select id="formRole" class="form-input">
                        <option value="MEMBER">MEMBER</option>
                        <option value="URC KC">URC KC</option>
                        <option value="BENDAHARA">BENDAHARA</option>
                        <option value="SEKRETARIS">SEKRETARIS</option>
                        <option value="HUMAS INTERNAL">HUMAS INTERNAL</option>
                        <option value="HUMAS EKSTERNAL">HUMAS EKSTERNAL</option>
                        <option value="KREATOR">KREATOR</option>
                        <option value="PENASEHAT">PENASEHAT</option>
                        <option value="PEMBINA">PEMBINA</option>
                        <option value="WAKIL KETUA">WAKIL KETUA</option>
                        <option value="KETUA UMUM">KETUA UMUM</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1;">
                    <label class="form-label">Divisi</label>
                    <select id="formType" class="form-input">
                        <option value="TRANSGO">TRANSGO</option>
                        <option value="RTO">RTO</option>
                    </select>
                </div>
            </div>
            <button class="btn-submit" id="btnSave" onclick="saveData()">SIMPAN DATA</button>
        </div>
    </div>

    <div class="modal-glass-overlay" id="customAlertModal">
        <div class="modal-glass-box">
            <div id="alertIcon" style="font-size: 40px; margin-bottom: 15px;"></div>
            <h3 id="alertTitle" style="font-family:'Outfit'; margin-top:0; margin-bottom:10px; font-size: 20px; color: var(--royal-blue);">TITLE</h3>
            <p id="alertMessage" style="font-size:12px; color:#cbd5e1; margin-bottom:20px; line-height: 1.5;"></p>
            <input type="text" id="alertInput" class="inp-prompt" placeholder="Ketik di sini...">
            <div style="display:flex; gap:10px;" id="alertBtnGroup">
                <button class="btn-modal-custom" id="btnAlertCancel" style="background:#333; color:white; display:none;">BATAL</button>
                <button class="btn-modal-custom" id="btnAlertOk" style="background:var(--royal-blue); color:black; width:100%;">OK</button>
            </div>
        </div>
    </div>

    <div class="photo-viewer-overlay" id="photoViewer" onclick="closePhoto()">
        <div class="pv-container" onclick="event.stopPropagation()">
            <img id="pvImage" src="">
            <button class="pv-close" onclick="closePhoto()"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, setDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDfsTAGclYUSRe6YhiljS-xb-v-9RBYVEM", authDomain: "antriankcnew.firebaseapp.com", projectId: "antriankcnew" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // --- SISTEM LIGHTBOX FOTO PROFIL ---
        window.viewPhoto = (src) => { 
            if(!src || src === 'null' || src.length < 50) return;
            document.getElementById('pvImage').src = src; 
            const pv = document.getElementById('photoViewer');
            pv.style.display = 'flex'; 
            setTimeout(() => pv.classList.add('show'), 10);
        };
        window.closePhoto = () => { 
            const pv = document.getElementById('photoViewer');
            pv.classList.remove('show');
            setTimeout(() => pv.style.display = 'none', 300);
        };

        // --- SISTEM CUSTOM MODAL PENGGANTI ALERT & CONFIRM ---
        window.showCustomAlert = (title, message, type = 'info') => {
            return new Promise((resolve) => {
                const modal = document.getElementById('customAlertModal');
                const icon = document.getElementById('alertIcon');
                const titleEl = document.getElementById('alertTitle');
                const btnCancel = document.getElementById('btnAlertCancel');
                const btnOk = document.getElementById('btnAlertOk');
                const input = document.getElementById('alertInput');
                
                input.style.display = 'none';
                btnCancel.style.display = 'none';
                btnOk.style.width = '100%';
                btnOk.innerText = 'SAYA MENGERTI';
                
                titleEl.innerText = title;
                document.getElementById('alertMessage').innerHTML = message;
                
                if (type === 'success') {
                    icon.innerHTML = '<i class="fas fa-check-circle" style="color: var(--success); filter: drop-shadow(0 0 10px var(--success));"></i>';
                    titleEl.style.color = 'var(--success)';
                    btnOk.style.background = 'var(--success)';
                    btnOk.style.color = 'white';
                } else if (type === 'error') {
                    icon.innerHTML = '<i class="fas fa-times-circle" style="color: var(--danger); filter: drop-shadow(0 0 10px var(--danger));"></i>';
                    titleEl.style.color = 'var(--danger)';
                    btnOk.style.background = 'var(--danger)';
                    btnOk.style.color = 'white';
                } else {
                    icon.innerHTML = '<i class="fas fa-info-circle" style="color: var(--royal-blue); filter: drop-shadow(0 0 10px var(--royal-blue));"></i>';
                    titleEl.style.color = 'var(--royal-blue)';
                    btnOk.style.background = 'var(--royal-blue)';
                    btnOk.style.color = 'black';
                }
                
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('show'), 10);
                
                btnOk.onclick = () => {
                    modal.classList.remove('show');
                    setTimeout(() => modal.style.display = 'none', 300);
                    resolve(true);
                };
            });
        };

        window.showCustomConfirm = (title, message, isPrompt = false) => {
            return new Promise((resolve) => {
                const modal = document.getElementById('customAlertModal');
                const icon = document.getElementById('alertIcon');
                const titleEl = document.getElementById('alertTitle');
                const btnCancel = document.getElementById('btnAlertCancel');
                const btnOk = document.getElementById('btnAlertOk');
                const input = document.getElementById('alertInput');
                
                icon.innerHTML = '<i class="fas fa-question-circle" style="color: var(--royal-blue); filter: drop-shadow(0 0 10px var(--royal-blue));"></i>';
                titleEl.style.color = 'var(--royal-blue)';
                titleEl.innerText = title;
                document.getElementById('alertMessage').innerHTML = message;
                
                btnCancel.style.display = 'block';
                btnOk.style.width = 'auto';
                btnOk.innerText = 'YA, LANJUTKAN';
                btnOk.style.background = 'var(--danger)';
                btnOk.style.color = 'white';
                
                if(isPrompt) {
                    input.style.display = 'block';
                    input.value = '';
                    setTimeout(() => input.focus(), 300);
                } else {
                    input.style.display = 'none';
                }
                
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('show'), 10);
                
                btnCancel.onclick = () => {
                    modal.classList.remove('show');
                    setTimeout(() => modal.style.display = 'none', 300);
                    resolve(false);
                };
                
                btnOk.onclick = () => {
                    modal.classList.remove('show');
                    setTimeout(() => modal.style.display = 'none', 300);
                    resolve(isPrompt ? input.value : true);
                };
            });
        };

        const hierarchy = { "KETUA UMUM": 1, "WAKIL KETUA": 2, "PEMBINA": 3, "PENASEHAT": 4, "SEKRETARIS": 5, "BENDAHARA": 6, "HUMAS INTERNAL": 7, "HUMAS EKSTERNAL": 8, "KREATOR": 9, "URC KC": 10, "URC": 10, "MEMBER": 11 };
        const getRank = (role) => { if(!role) return 11; const r = role.toUpperCase(); return hierarchy[r] || 12; };

        // SISTEM HAK AKSES ADMIN BERDASARKAN WHITELIST PLAT NOMOR (SANGAT KETAT)
        let uData = null;
        let isAdmin = false;
        let isSuperAdmin = false;

        try { 
            uData = JSON.parse(localStorage.getItem('maka_user')); 
            if(uData) {
                const plat = (uData.plat || "").replace(/\s+/g, '').toUpperCase();
                
                // DAFTAR PLAT YANG DIIZINKAN EDIT/TAMBAH ANGGOTA
                const allowedAdmins = [
                    "B4124SWI", // Agus Sukmana
                    "B4426SWF", // Rifky alfiansyah
                    "B4959SWF", // Alfian
                    "B4372SWJ", // FITO
                    "B4903SWG", // Dino Three
                    "B4248SWF"  // Plat Lu
                ];
                
                if(allowedAdmins.includes(plat)) {
                    isAdmin = true;
                }

                // KHUSUS PLAT LU (B4248SWF) BISA MATA DEWA
                if(plat === "B4248SWF") {
                    isSuperAdmin = true;
                    document.getElementById('mataDewaGroup').style.display = 'block';
                }
            }
        } catch (e) {}

        if (isAdmin) {
            document.getElementById('btnAdd').style.display = 'flex';
            const style = document.createElement('style'); style.innerHTML = '.btn-del, .btn-edit { display: flex !important; }'; document.head.appendChild(style);
        }

        let membersData = [];
        let currentPhotoBase64 = "";

        // BACA DATA REALTIME
        onSnapshot(collection(db, "anggota"), (snap) => {
            membersData = [];
            snap.forEach(doc => { membersData.push({ id: doc.id, ...doc.data() }); });
            renderList(membersData);
        });

        function renderList(data) {
            const list = document.getElementById('memberList'); list.innerHTML = '';
            
            data.sort((a, b) => {
                const rankA = getRank(a.role); const rankB = getRank(b.role);
                if (rankA !== rankB) return rankA - rankB;
                return (a.namaKtp || "").localeCompare(b.namaKtp || "");
            });

            data.forEach((m) => {
                const isPengurus = getRank(m.role) < 11;
                const hasPhoto = (m.foto && m.foto.length > 50);
                const photoHtml = hasPhoto ? `<img src="${m.foto}" class="m-photo-img">` : `<div class="m-photo-fallback"><i class="fas fa-user"></i></div>`;
                const photoClick = hasPhoto ? `onclick="viewPhoto('${m.foto}')"` : ``;
                const waLink = m.hp ? `https://wa.me/62${m.hp.replace(/^0+/, '').replace(/\s+/g, '')}` : '#';

                const namaUtama = m.namaKtp || m.nama || "MEMBER KC";
                let namaWaHtml = "";
                if(m.namaWa || (m.nama && m.nama !== m.namaKtp)) {
                    const callName = m.namaWa || m.nama;
                    if(callName !== namaUtama) namaWaHtml = `<div class="m-name-wa">Nama di WA: ${callName}</div>`;
                }

                const encodedData = encodeURIComponent(JSON.stringify(m));

                list.innerHTML += `
                    <div class="member-card ${isPengurus?'is-pengurus':''}">
                        <div class="m-photo-wrap" ${photoClick}><div class="m-photo-bg"></div>${photoHtml}</div>
                        <div class="m-info">
                            <div class="m-name">${namaUtama}</div>
                            ${namaWaHtml}
                            <div class="m-badges">
                                <span class="badge bg-plat">${m.plat}</span>
                                <span class="badge bg-role">${m.type || m.vendor || 'TRANSGO'}</span>
                                ${isPengurus ? `<span class="badge bg-admin">${m.role}</span>` : ''}
                            </div>
                        </div>
                        <div class="m-actions">
                            <a href="${waLink}" class="btn-act btn-call" target="_blank"><i class="fab fa-whatsapp"></i></a>
                            <button class="btn-act btn-edit" style="display:${isAdmin?'flex':'none'};" onclick="openModal('edit', '${encodedData}')"><i class="fas fa-pen"></i></button>
                            <button class="btn-act btn-del" style="display:${isAdmin?'flex':'none'};" onclick="deleteMember('${m.id}', '${namaUtama}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        window.processPhoto = (input) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
                        let w = img.width; let h = img.height;
                        if (w > h) { if (w > 400) { h *= 400/w; w = 400; } } else { if (h > 400) { w *= 400/h; h = 400; } }
                        cvs.width = w; cvs.height = h; ctx.drawImage(img, 0, 0, w, h);
                        currentPhotoBase64 = cvs.toDataURL('image/png');
                        const p = document.getElementById('previewFoto'); p.src = currentPhotoBase64; p.style.display = 'block';
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        };

        const modal = document.getElementById('formModal');
        
        window.openModal = (type, dataString = null) => { 
            document.getElementById('formActionType').value = type;
            
            if (type === 'add') {
                document.getElementById('modalTitleText').innerText = "Tambah Anggota";
                document.getElementById('formId').value = '';
                document.getElementById('formNamaKtp').value = '';
                document.getElementById('formNamaWa').value = '';
                document.getElementById('formPlat').value = '';
                document.getElementById('formHp').value = '';
                document.getElementById('formRole').value = 'MEMBER';
                document.getElementById('formType').value = 'TRANSGO';
                document.getElementById('previewFoto').style.display = 'none';
                document.getElementById('formFotoInput').value = '';
                document.getElementById('formPinLogin').value = '';
                currentPhotoBase64 = "";
            } else if (type === 'edit' && dataString) {
                document.getElementById('modalTitleText').innerText = "Edit Anggota";
                const d = JSON.parse(decodeURIComponent(dataString));
                document.getElementById('formId').value = d.id;
                document.getElementById('formNamaKtp').value = d.namaKtp || d.nama || '';
                document.getElementById('formNamaWa').value = d.namaWa || d.nama || '';
                document.getElementById('formPlat').value = d.plat || '';
                document.getElementById('formHp').value = d.hp || '';
                document.getElementById('formRole').value = d.role || 'MEMBER';
                document.getElementById('formType').value = d.type || d.vendor || 'TRANSGO';
                
                // MATA DEWA: BACA PIN LOGIN
                if (isSuperAdmin) {
                    document.getElementById('formPinLogin').value = d.pin_login || d.pin || '';
                }
                
                if(d.foto && d.foto.length > 50) {
                    currentPhotoBase64 = d.foto;
                    const p = document.getElementById('previewFoto');
                    p.src = currentPhotoBase64;
                    p.style.display = 'block';
                } else {
                    currentPhotoBase64 = "";
                    document.getElementById('previewFoto').style.display = 'none';
                }
            }

            modal.style.display = 'flex'; 
            setTimeout(()=>modal.classList.add('show'), 10);
        };
        
        window.closeModal = () => { 
            modal.classList.remove('show'); 
            setTimeout(()=>modal.style.display = 'none', 300);
        };

        window.saveData = async () => {
            const namaKtp = document.getElementById('formNamaKtp').value.trim().toUpperCase();
            const namaWa = document.getElementById('formNamaWa').value.trim().toUpperCase();
            const platRaw = document.getElementById('formPlat').value.trim().toUpperCase();
            const platClean = platRaw.replace(/\s+/g, ''); 
            const hp = document.getElementById('formHp').value.trim();
            const role = document.getElementById('formRole').value;
            const type = document.getElementById('formType').value;
            const actionType = document.getElementById('formActionType').value;
            const oldId = document.getElementById('formId').value;

            if(!namaKtp || !platRaw) return showCustomAlert("PERHATIAN", "Nama KTP dan Plat Nomor Wajib Diisi!", "error");

            const btn = document.getElementById('btnSave');
            btn.innerText = "MENYIMPAN..."; btn.style.opacity = '0.7';

            try {
                const newId = platClean;
                
                let payload = {
                    namaKtp: namaKtp,
                    namaWa: namaWa,
                    nama: namaWa || namaKtp, 
                    plat: platRaw,
                    hp: hp,
                    role: role,
                    type: type,
                };

                // JIKA SUPER ADMIN (MATA DEWA) MENGISI PIN, SIMPAN PIN-NYA
                if (isSuperAdmin) {
                    const inputPin = document.getElementById('formPinLogin').value.trim();
                    if (inputPin !== "") {
                        payload.pin_login = inputPin;
                    }
                }

                if(currentPhotoBase64) {
                    payload.foto = currentPhotoBase64;
                }

                if (actionType === 'edit' && oldId && oldId !== newId) {
                    const oldDataIndex = membersData.findIndex(m => m.id === oldId);
                    if(oldDataIndex !== -1) {
                        const dLama = membersData[oldDataIndex];
                        payload.tabungan = dLama.tabungan || 0;
                        if(dLama.pin_tabungan) payload.pin_tabungan = dLama.pin_tabungan;
                        
                        if(!isSuperAdmin && dLama.pin_login) payload.pin_login = dLama.pin_login;
                        
                        if(dLama.faceDescriptor) payload.faceDescriptor = dLama.faceDescriptor;
                        if(dLama.kodeUnik) payload.kodeUnik = dLama.kodeUnik;
                    }
                    await deleteDoc(doc(db, "anggota", oldId));
                }

                await setDoc(doc(db, "anggota", newId), payload, { merge: true });

                closeModal();
                showCustomAlert("SUKSES", "Data anggota berhasil disimpan.", "success");
            } catch (e) {
                showCustomAlert("GAGAL", "Gagal menyimpan: " + e.message, "error");
            } finally {
                btn.innerText = "SIMPAN DATA"; btn.style.opacity = '1';
            }
        };

        window.deleteMember = async (id, nama) => { 
            const ok = await showCustomConfirm("HAPUS ANGGOTA", `Yakin ingin menghapus data <b>${nama}</b> secara permanen?<br><br><span style='color:var(--danger);'>Semua data Tabungan & Keamanan orang ini akan ikut hilang!</span>`);
            if(ok) {
                await deleteDoc(doc(db, "anggota", id)); 
                showCustomAlert("DIHAPUS", "Data anggota berhasil dihapus.", "success");
            }
        };

        window.filterList = () => { const txt = document.getElementById('searchInput').value.toLowerCase(); const filtered = membersData.filter(m => (m.namaKtp && m.namaKtp.toLowerCase().includes(txt)) || (m.namaWa && m.namaWa.toLowerCase().includes(txt)) || (m.plat && m.plat.toLowerCase().includes(txt)) || (m.role && m.role.toLowerCase().includes(txt))); renderList(filtered); };
    </script>
</body>
</html>
